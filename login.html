<!DOCTYPE html>
<html data-bs-theme="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Login - Brand</title>
    <link rel="icon" type="image/png" href="assets/img/Seal_of_Angeles_City.png">
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i&amp;display=swap">
    <link rel="stylesheet" href="assets/fonts/fontawesome-all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/dark-theme.css">
</head>

<body class="main-container">
    <div class="container d-flex align-items-center min-vh-100">
        <div class="row justify-content-center w-100">
            <div class="col-md-9 col-lg-12 col-xl-10">
                <div class="card shadow-lg my-5 o-hidden border-0">
                    <div class="card-body p-0">
                        <div class="row">
                            <div class="col-lg-6 d-none d-lg-flex">
                                <div class="flex-grow-1 bg-login-image"></div>
                            </div>
                            <div class="col-lg-6">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h4 class="text-dark mb-4">Welcome Back!</h4>
                                    </div>
                                    <form class="user">
                                        <div class="mb-3"><input class="form-control form-control-user" type="email" id="exampleInputEmail" aria-describedby="emailHelp" placeholder="Enter Email Address..." name="email"></div>
                                        <div class="mb-3"><input class="form-control form-control-user" type="password" id="exampleInputPassword" placeholder="Password" name="password"></div>
                                        <div class="mb-3">
                                            <div class="custom-checkbox small">
                                                <div class="form-check"><input class="form-check-input" type="checkbox" id="formCheck-1"><label class="form-check-label" for="formCheck-1">Remember Me</label></div>
                                            </div>
                                        </div><button class="mb-3 btn btn-primary d-block w-100 btn-user" type="submit">Login</button>

                                    </form>
                                    <div class="text-center"><a class="small" href="forgot-password.html">Forgot Password?</a></div>
                                    <div class="text-center"><a class="small" href="register.html">Create an Account!</a></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Firebase SDKs -->
    <script type="module" src="assets/js/firebase-config.js"></script>
    <script type="module" src="assets/js/firebase-db.js"></script>
    
    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="assets/js/bs-init.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script type="module">
        import { loginUser, logActivity } from './assets/js/auth-firebase.js';
        import { auth, db, COLLECTIONS } from './assets/js/firebase-config.js';
        import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js';
        import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js';

        function redirectByRole(role) {
            if (role === 'resident') {
                window.location.href = 'residents.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // If already logged in and approved, redirect to dashboard
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    const userDoc = await getDoc(doc(db, COLLECTIONS.users, user.uid));
                    if (userDoc.exists() && userDoc.data().status === 'approved') {
                        window.location.href = 'dashboard.html';
                    }
                }
            });

            const form = document.querySelector('form.user');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email    = document.getElementById('exampleInputEmail').value.trim();
                    const password = document.getElementById('exampleInputPassword').value;

                    if (!email || !password) {
                        Swal.fire('Error', 'Email/password required', 'warning');
                        return;
                    }

                    try {
                        const firebaseUser = await loginUser(email, password);

                        // Check approval status in Firestore
                        const userDoc = await getDoc(doc(db, COLLECTIONS.users, firebaseUser.uid));

                        if (!userDoc.exists()) {
                            await signOut(auth);
                            Swal.fire('Error', 'Account not found. Please contact the administrator.', 'error');
                            return;
                        }

                        const userData = userDoc.data();

                        if (userData.status === 'pending') {
                            await signOut(auth);
                            Swal.fire({
                                icon: 'info',
                                title: 'Account Pending Approval',
                                html: `Hi <strong>${userData.firstName}</strong>, your account is awaiting approval from the Barangay Captain.<br><br>Please check back later or contact the barangay office.`,
                                confirmButtonColor: '#4e73df',
                                confirmButtonText: 'OK'
                            });
                            return;
                        }

                        if (userData.status === 'rejected') {
                            await signOut(auth);
                            Swal.fire({
                                icon: 'error',
                                title: 'Account Rejected',
                                text: 'Your account registration was not approved. Please contact the barangay office for more information.',
                                confirmButtonColor: '#e74a3b'
                            });
                            return;
                        }

                        // Approved — go to dashboard
                        await logActivity('login', 'auth', `User logged in: ${email}`);
                        window.location.href = 'dashboard.html';

                    } catch (error) {
                        let msg = 'Login failed. Please check your credentials.';
                        if (error.code === 'auth/user-not-found'  ) msg = 'No account found with this email.';
                        if (error.code === 'auth/wrong-password'  ) msg = 'Incorrect password.';
                        if (error.code === 'auth/invalid-credential') msg = 'Invalid email or password.';
                        Swal.fire('Login Failed', msg, 'error');
                    }
                });
            }
        });
    </script>
    <script src="assets/js/theme-toggle.js"></script>
</body>

</html>
