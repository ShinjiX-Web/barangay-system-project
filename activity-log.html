<li class="nav-item me-1">

                                    <a class="dropdown-item" href="profile.html"><i class="fas fa-user me-2 fa-sm fa-fw text-gray-400"></i>&nbsp;Profile</a>

                    <button class="btn btn-outline-danger btn-sm" onclick="clearLogs()"><i class="fas fa-trash fa-sm me-1"></i>Clear All Logs</button>
                </div>

                <!-- Filter Row -->
                <div class="card shadow mb-4">
                    <div class="card-body py-2">
                        <div class="row align-items-center">
                            <div class="col-md-3">
                                <select class="form-select form-select-sm" id="filterAction" onchange="applyFilters()">
                                    <option value="">All Actions</option>
                                    <option value="login">Login</option>
                                    <option value="logout">Logout</option>
                                    <option value="create">Create</option>
                                    <option value="update">Update</option>
                                    <option value="delete">Delete</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <select class="form-select form-select-sm" id="filterModule" onchange="applyFilters()">
                                    <option value="">All Modules</option>
                                    <option value="residents">Residents</option>
                                    <option value="certificates">Certificates</option>
                                    <option value="staff">Staff</option>
                                    <option value="profile">Profile</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <input type="search" class="form-control form-control-sm" id="filterSearch" placeholder="Search by user or description..." oninput="applyFilters()">
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-outline-primary btn-sm w-100" onclick="loadLogs()"><i class="fas fa-sync me-1"></i>Refresh</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Log Table -->
                <div class="card shadow mb-4">
                    <div class="card-header py-3 d-flex justify-content-between align-items-center">
                        <h6 class="text-primary m-0 fw-bold">System Activity</h6>
                        <span id="logCount" class="badge bg-primary">0 entries</span>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover table-sm">
                                <thead>
                                    <tr>
                                        <th style="width:160px">Timestamp</th>
                                        <th>User</th>
                                        <th>Action</th>
                                        <th>Module</th>
                                        <th>Description</th>
                                    </tr>
                                </thead>
                                <tbody id="logTableBody">
                                    <tr>
                                        <td colspan="5" class="text-center text-muted py-3">
                                            <span class="spinner-border spinner-border-sm me-2"></span>Loading logs...

<script src="assets/bootstrap/js/bootstrap.min.js"></script>
<script src="assets/js/bs-init.js"></script>
<script src="assets/js/theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module">
    import { auth, db, COLLECTIONS } from './assets/js/firebase-config.js';
    import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js';
    import { collection, getDocs, getDoc, doc, addDoc, deleteDoc, query, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js';

    let allLogs = [];

    window.logout     = async () => { await signOut(auth); window.location.href = 'login.html'; };
    window.loadLogs   = loadLogs;
    window.applyFilters = applyFilters;
    window.clearLogs  = clearLogs;

    document.addEventListener('DOMContentLoaded', () => {
        onAuthStateChanged(auth, async (firebaseUser) => {
            if (!firebaseUser) { window.location.href = 'login.html'; return; }

            try {
                const userDoc = await getDoc(doc(db, COLLECTIONS.users, firebaseUser.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    const el = document.getElementById('userName');
                    if (el) el.textContent = `${data.firstName || ''} ${data.lastName || ''}`.trim() || firebaseUser.email;
                    if (data.profilePhoto) {
                        document.querySelectorAll('.user-profile-img, .img-profile').forEach(img => img.src = data.profilePhoto);
                    }
                }
            } catch(e) { console.warn(e.message); }

            await loadLogs();
        });
    });

    async function loadLogs() {
        const tbody = document.getElementById('logTableBody');
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3"><span class="spinner-border spinner-border-sm me-2"></span>Loading logs...</td></tr>';

        try {
            const q = query(collection(db, COLLECTIONS.activityLogs), orderBy('timestamp', 'desc'));
            const snap = await getDocs(q);
            allLogs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderLogs(allLogs);
        } catch(err) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Error: ${err.message}</td></tr>`;
        }
    }

    function renderLogs(logs) {
        const tbody  = document.getElementById('logTableBody');
        const countEl = document.getElementById('logCount');

        if (!logs.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">No activity logs found.</td></tr>';
            if (countEl) countEl.textContent = '0 entries';
            return;
        }

        const actionBadge = {
            login:   'badge bg-success',
            logout:  'badge bg-secondary',
            create:  'badge bg-primary',
            update:  'badge bg-warning text-dark',
            delete:  'badge bg-danger',
        };

        tbody.innerHTML = logs.map(log => {
            const ts = log.timestamp?.toDate
                ? log.timestamp.toDate().toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' })
                : '—';
            const badge = actionBadge[log.action] || 'badge bg-secondary';
            return `<tr>
                <td class="small text-muted">${ts}</td>
                <td class="small">${log.userName || log.userEmail || '—'}</td>
                <td><span class="${badge}">${(log.action || '—').toUpperCase()}</span></td>
                <td class="small text-capitalize">${log.module || '—'}</td>
                <td class="small">${log.description || '—'}</td>
            </tr>`;
        }).join('');

        if (countEl) countEl.textContent = `${logs.length} entr${logs.length !== 1 ? 'ies' : 'y'}`;
    }

    function applyFilters() {
        const action = document.getElementById('filterAction').value;
        const module = document.getElementById('filterModule').value;
        const search = document.getElementById('filterSearch').value.toLowerCase();

        renderLogs(allLogs.filter(log =>
            (!action || log.action === action) &&
            (!module || log.module === module) &&
            (!search || (log.userName || '').toLowerCase().includes(search) ||
                        (log.description || '').toLowerCase().includes(search))
        ));
    }

    async function clearLogs() {
        const result = await Swal.fire({
            title: 'Clear All Logs?', text: 'This will permanently delete all activity logs.',
            icon: 'warning', showCancelButton: true,
            confirmButtonColor: '#d33', confirmButtonText: 'Yes, clear all'
        });
        if (!result.isConfirmed) return;

        try {
            const snap = await getDocs(collection(db, COLLECTIONS.activityLogs));
            await Promise.all(snap.docs.map(d => deleteDoc(doc(db, COLLECTIONS.activityLogs, d.id))));
            allLogs = [];
            renderLogs([]);
            Swal.fire({ icon: 'success', title: 'Cleared!', timer: 1500, showConfirmButton: false });
        } catch(err) {
            Swal.fire({ icon: 'error', title: 'Error', text: err.message });
        }
    }
</script>
    <script type="module">
        import { auth, db, COLLECTIONS } from './assets/js/firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js';
        import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js';

        // Show admin-only sidebar items if user is admin
        onAuthStateChanged(auth, async (firebaseUser) => {
            if (!firebaseUser) return;
            try {
                const snap = await getDoc(doc(db, COLLECTIONS.users, firebaseUser.uid));
                if (snap.exists() && snap.data().role === 'admin') {
                    const el = document.getElementById('adminSidebarItems');
                    if (el) el.style.display = 'block';
                }
            } catch(e) { console.warn(e.message); }
        });
    </script>
</body>
