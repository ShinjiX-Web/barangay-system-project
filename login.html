<!DOCTYPE html>
<html data-bs-theme="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Login</title>
    <link rel="icon" type="image/png" href="assets/img/Seal_of_Angeles_City.png">
    <link rel="stylesheet" href="assets/fonts/fontawesome-all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        /* ── Theme tokens ───────────────────────────────────────────── */
        :root {
            --pg-bg:            #f4f4f5;
            --pg-gradient:      linear-gradient(135deg, #dbeafe 0%, #f1f5f9 50%, #ede9fe 100%);
            --card-bg:          #ffffff;
            --card-border:      #e4e4e7;
            --text:             #09090b;
            --text-muted:       #71717a;
            --placeholder:      #a1a1aa;
            --input-bg:         #ffffff;
            --input-border:     #e4e4e7;
            --input-focus:      #71717a;
            --btn-bg:           #09090b;
            --btn-text:         #fafafa;
            --btn-hover:        #18181b;
            --divider-color:    #e4e4e7;
            --link-color:       #09090b;
            --link-muted:       #71717a;
            --toggle-border:    #e4e4e7;
            --toggle-color:     #71717a;
            --toggle-hover-bg:  #f4f4f5;
            --spinner-border:   #09090b;
        }

        [data-bs-theme="dark"] {
            --pg-bg:            #09090b;
            --pg-gradient:      linear-gradient(135deg, #0f172a 0%, #09090b 50%, #1e0a2e 100%);
            --card-bg:          #0f0f12;
            --card-border:      #27272a;
            --text:             #fafafa;
            --text-muted:       #a1a1aa;
            --placeholder:      #52525b;
            --input-bg:         #09090b;
            --input-border:     #27272a;
            --input-focus:      #71717a;
            --btn-bg:           #fafafa;
            --btn-text:         #09090b;
            --btn-hover:        #e4e4e7;
            --divider-color:    #27272a;
            --link-color:       #fafafa;
            --link-muted:       #a1a1aa;
            --toggle-border:    #27272a;
            --toggle-color:     #a1a1aa;
            --toggle-hover-bg:  #18181b;
            --spinner-border:   #09090b;
            --section-label:    #818cf8;
        }

        /* ── Base ───────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            min-height: 100vh;
            background: var(--pg-gradient);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            transition: background 0.3s, color 0.2s;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            min-height: 100vh;
        }

        .login-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            gap: 2rem;
            position: relative;
            z-index: 1;
        }

        .cloud-side {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #icon-cloud-canvas {
            cursor: grab;
            border-radius: 0.5rem;
        }

        #icon-cloud-canvas:active { cursor: grabbing; }

        @media (max-width: 768px) {
            .login-layout { grid-template-columns: 1fr; }
            .cloud-side { display: none; }
        }

        .striped-pattern {
            pointer-events: none;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            color: rgba(99, 102, 241, 0.35);
            stroke-width: 0.5;
        }

        [data-bs-theme="dark"] .striped-pattern {
            color: rgba(165, 180, 252, 0.2);
        }

        /* ── Theme toggle ───────────────────────────────────────────── */
        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1050;
            background: none;
            border: 1px solid var(--toggle-border);
            border-radius: 0.375rem;
            color: var(--toggle-color);
            width: 2.25rem;
            height: 2.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }
        .theme-toggle:hover {
            border-color: var(--input-focus);
            color: var(--text);
            background: var(--toggle-hover-bg);
        }

        /* ── Wrapper & card ─────────────────────────────────────────── */
        .login-wrapper { 
            width: 100%; 
            position: relative; 
            z-index: 1; 
            max-width: 400px;
        }

        .branding {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.625rem;
            margin-bottom: 1.75rem;
        }
        .branding img {
            width: 32px; height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .branding-name {
            font-size: 0.9375rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .branding-name em {
            font-style: normal;
            color: var(--section-label);
        }

        .login-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 0.75rem;
            padding: 2rem;
            transition: background-color 0.2s, border-color 0.2s;
            position: relative;
        }

        @keyframes border-beam {
            from { offset-distance: 0%; }
            to   { offset-distance: 100%; }
        }

        .border-beam-wrap {
            pointer-events: none;
            position: absolute;
            inset: 0;
            border-radius: inherit;
            border: 1px solid transparent;
            -webkit-mask-image: linear-gradient(#000 0 0), linear-gradient(#000 0 0);
            mask-image: linear-gradient(#000 0 0), linear-gradient(#000 0 0);
            -webkit-mask-clip: padding-box, border-box;
            mask-clip: padding-box, border-box;
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .border-beam {
            position: absolute;
            width: 80px;
            aspect-ratio: 1 / 1;
            background: linear-gradient(to left, transparent, #9c40ff, #ffaa40);
            offset-path: rect(0 auto auto 0 round 0.75rem);
            animation: border-beam 6s linear infinite;
        }

        .login-header { margin-bottom: 1.5rem; }
        .login-header h1 {
            font-size: 1.375rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.375rem;
            letter-spacing: -0.02em;
        }
        .login-header p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* ── Form elements ──────────────────────────────────────────── */
        .form-group { margin-bottom: 1rem; }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 0.375rem;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.375rem;
        }
        .label-row .form-label { margin-bottom: 0; }

        .forgot-link {
            font-size: 0.8125rem;
            color: var(--text-muted);
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: transparent;
            transition: color 0.15s, text-decoration-color 0.15s;
        }
        .forgot-link:hover {
            color: var(--text);
            text-decoration-color: var(--text-muted);
        }

        .shadcn-input {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 0.375rem;
            color: var(--text);
            font-size: 0.875rem;
            font-family: 'Inter', sans-serif;
            padding: 0.5rem 0.75rem;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s, background-color 0.2s;
        }
        .shadcn-input::placeholder { color: var(--placeholder); }
        .shadcn-input:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 2px rgba(113,113,122,0.2);
        }

        .pw-wrap { position: relative; }
        .pw-wrap .shadcn-input { padding-right: 2.5rem; }

        .toggle-pw {
            position: absolute;
            right: 0.625rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.25rem;
            display: flex;
            align-items: center;
            transition: color 0.15s;
        }
        .toggle-pw:hover { color: var(--text); }

        /* ── Submit button ──────────────────────────────────────────── */
        .btn-login {
            width: 100%;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            padding: 0.5625rem 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background-color 0.15s, opacity 0.15s;
        }
        .btn-login:hover:not(:disabled) { background-color: var(--btn-hover); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── Divider & footer ───────────────────────────────────────── */
        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.25rem 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--divider-color);
            transition: background 0.2s;
        }
        .divider span {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .signup-text {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 1.25rem;
        }
        .signup-text a {
            color: var(--link-color);
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: var(--divider-color);
            transition: text-decoration-color 0.15s;
        }
        .signup-text a:hover { text-decoration-color: var(--link-color); }

        .back-home {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.375rem;
            font-size: 0.8125rem;
            color: var(--text-muted);
            text-decoration: none;
            margin-top: 1.25rem;
            transition: color 0.15s;
        }
        .back-home:hover { color: var(--text); }
        .back-home i { font-size: 0.7rem; }

        /* ── Spinner ────────────────────────────────────────────────── */
        .spinner {
            display: inline-block;
            width: 0.875rem;
            height: 0.875rem;
            border: 2px solid var(--spinner-border);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 0.375rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>
<!-- Striped background pattern -->
<svg class="striped-pattern" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="stripe-bg" width="10" height="10" patternUnits="userSpaceOnUse">
      <line x1="0" y1="10" x2="10" y2="0" stroke="currentColor"/>
      <line x1="-10" y1="10" x2="0" y2="0" stroke="currentColor"/>
      <line x1="10" y1="10" x2="20" y2="0" stroke="currentColor"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#stripe-bg)"/>
</svg>
    <button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()" title="Switch to Dark Mode">
        <i class="fas fa-moon fa-sm"></i>
    </button>

    <div class="login-layout">
    <div class="cloud-side">
        <canvas id="icon-cloud-canvas" width="500" height="500" aria-label="Icon Cloud" role="img"></canvas>
    </div>
    <div class="login-wrapper">
        <div class="branding">
            <picture><source srcset="assets/img/Seal_of_Angeles_City.webp" type="image/webp"><img src="assets/img/Seal_of_Angeles_City.png" alt="Barangay 14 Seal" width="64" height="64"></picture>
            <span class="branding-name">Barangay<em>Serve</em></span>
        </div>

        <div class="login-card">
            <div class="border-beam-wrap"><div class="border-beam"></div></div>
            <div class="login-header">
                <h1>Login to your account</h1>
                <p>Enter your email below to login to your account</p>
            </div>

            <form class="user" novalidate>
                <div class="form-group">
                    <label class="form-label" for="exampleInputEmail">Email</label>
                    <input class="shadcn-input" type="email" id="exampleInputEmail"
                           placeholder="m@example.com" name="email" autocomplete="email">
                </div>

                <div class="form-group">
                    <div class="label-row">
                        <label class="form-label" for="exampleInputPassword">Password</label>
                        <a class="forgot-link" href="forgot-password.html">Forgot your password?</a>
                    </div>
                    <div class="pw-wrap">
                        <input class="shadcn-input" type="password" id="exampleInputPassword"
                               name="password" autocomplete="current-password">
                        <button type="button" class="toggle-pw"
                                onclick="togglePassword('exampleInputPassword', this)" tabindex="-1">
                            <i class="fas fa-eye fa-sm"></i>
                        </button>
                    </div>
                </div>

                <button class="btn-login" type="submit" id="loginBtn">Login</button>
            </form>

            <div class="divider"><span>or</span></div>

            <div class="signup-text">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>

        <a class="back-home" href="/">
            <i class="fas fa-arrow-left"></i> Back to Homepage
        </a>
    </div>
    </div> <!-- /.login-layout -->

    <!-- Firebase SDKs -->
    <script type="module" src="assets/js/firebase-config.js"></script>
    <script type="module" src="assets/js/firebase-db.js"></script>
    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon  = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>

    <script type="module">
        import { loginUser, logActivity } from './assets/js/auth-firebase.js';
        import { auth, db, COLLECTIONS } from './assets/js/firebase-config.js';
        import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js';
        import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js';

        document.addEventListener('DOMContentLoaded', () => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    const userDoc = await getDoc(doc(db, COLLECTIONS.users, user.uid));
                    if (userDoc.exists() && userDoc.data().status === 'approved') {
                        window.location.href = 'dashboard.html';
                    }
                }
            });

            const form = document.querySelector('form.user');
            const btn  = document.getElementById('loginBtn');

            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email    = document.getElementById('exampleInputEmail').value.trim();
                    const password = document.getElementById('exampleInputPassword').value;

                    if (!email || !password) {
                        Swal.fire('Error', 'Email and password are required.', 'warning');
                        return;
                    }

                    btn.disabled = true;
                    btn.innerHTML = '<span class="spinner"></span>Logging in…';

                    try {
                        const firebaseUser = await loginUser(email, password);
                        const userDoc = await getDoc(doc(db, COLLECTIONS.users, firebaseUser.uid));

                        if (!userDoc.exists()) {
                            await signOut(auth);
                            Swal.fire('Error', 'Account not found. Please contact the administrator.', 'error');
                            return;
                        }

                        const userData = userDoc.data();

                        if (userData.status === 'pending') {
                            await signOut(auth);
                            Swal.fire({
                                icon: 'info',
                                title: 'Account Pending Approval',
                                html: `Hi <strong>${userData.firstName}</strong>, your account is awaiting approval from the Barangay Captain.<br><br>Please check back later or contact the barangay office.`,
                                confirmButtonColor: '#4e73df',
                                confirmButtonText: 'OK'
                            });
                            return;
                        }

                        if (userData.status === 'rejected') {
                            await signOut(auth);
                            Swal.fire({
                                icon: 'error',
                                title: 'Account Rejected',
                                text: 'Your account registration was not approved. Please contact the barangay office for more information.',
                                confirmButtonColor: '#e74a3b'
                            });
                            return;
                        }

                        await logActivity('login', 'auth', `User logged in: ${email}`);
                        window.location.href = userData.role === 'resident' ? 'residents.html' : 'dashboard.html';

                    } catch (error) {
                        let msg = 'Login failed. Please check your credentials.';
                        if (error.code === 'auth/user-not-found'    ) msg = 'No account found with this email.';
                        if (error.code === 'auth/wrong-password'    ) msg = 'Incorrect password.';
                        if (error.code === 'auth/invalid-credential') msg = 'Invalid email or password.';
                        Swal.fire('Login Failed', msg, 'error');
                    } finally {
                        btn.disabled = false;
                        btn.textContent = 'Login';
                    }
                });
            }
        });
    </script>

    <!-- Load last so toggleTheme() is available before DOMContentLoaded -->
    <script src="assets/js/theme-toggle.js"></script>

    <script>
    (function(){
        var canvas = document.getElementById('icon-cloud-canvas');
        if(!canvas) return;
        var ctx = canvas.getContext('2d');

        // Tech icons as image URLs from simple-icons CDN
        var iconSlugs = [
            'firebase','googlecloud','typescript','javascript','react',
            'html5','css3','nodedotjs','mongodb','postgresql',
            'git','github','figma','tailwindcss','bootstrap',
            'php','mysql','linux','docker','vite'
        ];

        var images = [], loaded = 0;
        iconSlugs.forEach(function(slug, i){
            var img = new Image();
            img.crossOrigin = 'anonymous';
            // Use a colored badge from shields.io — reliable, no CORS
            img.src = 'https://cdn.simpleicons.org/' + slug;
            img.onload = function(){ loaded++; };
            img.onerror = function(){ loaded++; }; // skip broken
            images[i] = img;
        });

        // Fibonacci sphere positions
        var NUM = iconSlugs.length;
        var positions = [];
        var offset = 2 / NUM, inc = Math.PI * (3 - Math.sqrt(5));
        for(var i=0;i<NUM;i++){
            var y = i*offset - 1 + offset/2;
            var r = Math.sqrt(1 - y*y);
            var phi = i*inc;
            positions.push({ x: Math.cos(phi)*r*160, y: y*160, z: Math.sin(phi)*r*160 });
        }

        var rot = { x: 0.3, y: 0 };
        var mouse = { x: 200, y: 200 };
        var drag = false, lastMouse = { x:0, y:0 };

        canvas.addEventListener('mousedown', function(e){
            drag=true; lastMouse={x:e.clientX,y:e.clientY};
        });
        canvas.addEventListener('mousemove', function(e){
            var r=canvas.getBoundingClientRect();
            mouse={x:e.clientX-r.left, y:e.clientY-r.top};
            if(drag){
                rot.y += (e.clientX-lastMouse.x)*0.003;
                rot.x += (e.clientY-lastMouse.y)*0.003;
                lastMouse={x:e.clientX,y:e.clientY};
            }
        });
        canvas.addEventListener('mouseup',  function(){ drag=false; });
        canvas.addEventListener('mouseleave',function(){ drag=false; });

        function easeOutCubic(t){ return 1-Math.pow(1-t,3); }

        function draw(){
            requestAnimationFrame(draw);
            ctx.clearRect(0,0,500,500);

            // Auto-rotate when not dragging
            if(!drag){
                var cx=250,cy=250;
                var dx=mouse.x-cx, dy=mouse.y-cy;
                var dist=Math.sqrt(dx*dx+dy*dy)||1;
                var spd=0.0008+(dist/354)*0.002;
                rot.y += (dx/500)*spd*10;
                rot.x += (dy/500)*spd*10;
            }

            var cosX=Math.cos(rot.x), sinX=Math.sin(rot.x);
            var cosY=Math.cos(rot.y), sinY=Math.sin(rot.y);

            // Compute projected positions and sort back-to-front
            var projected = positions.map(function(p,i){
                var rx = p.x*cosY - p.z*sinY;
                var rz = p.x*sinY + p.z*cosY;
                var ry = p.y*cosX + rz*sinX;
                rz     = rz*cosX - p.y*sinX;
                return { sx:250+rx, sy:250+ry, rz:rz, i:i };
            });
            projected.sort(function(a,b){ return a.rz-b.rz; });

            projected.forEach(function(p){
                var scale   = (p.rz+260)/360;
                var opacity = Math.max(0.2, Math.min(1,(p.rz+200)/260));
                var sz = 42*scale;
                var img = images[p.i];
                ctx.save();
                ctx.globalAlpha = opacity;
                if(img && img.complete && img.naturalWidth){
                    // Draw circular clipped icon
                    ctx.beginPath();
                    ctx.arc(p.sx, p.sy, sz/2, 0, Math.PI*2);
                    ctx.clip();
                    ctx.drawImage(img, p.sx-sz/2, p.sy-sz/2, sz, sz);
                } else {
                    // Fallback dot
                    ctx.beginPath();
                    ctx.arc(p.sx, p.sy, sz/2, 0, Math.PI*2);
                    ctx.fillStyle='rgba(129,140,248,'+(opacity)+')';
                    ctx.fill();
                }
                ctx.restore();
            });
        }
        draw();
    })();
    </script>
</body>
