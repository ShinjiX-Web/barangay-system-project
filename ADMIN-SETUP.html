<!DOCTYPE html>
<html data-bs-theme="light" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Setup - Barangay 14</title>
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/fonts/fontawesome-all.min.css">
    <link rel="stylesheet" href="css/dark-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gradient-primary">
    <!-- Theme Toggle Button (Fixed Position) -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 1050;">
        <button class="btn btn-link text-white" id="themeToggleBtn" onclick="toggleTheme()" title="Switch to Dark Mode">
            <i class="fas fa-moon fa-fw fa-2x"></i>
        </button>
    </div>
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 mt-5">
                <div class="card shadow">
                    <div class="card-header">
                        <h4 class="text-primary mb-0">Admin Setup &amp; Database Check</h4>
                    </div>
                    <div class="card-body">
                        <h5>Firebase Auth Status</h5>
                        <div id="authStatus" class="alert alert-info">Checking...</div>

                        <h5 class="mt-4">Firestore Collections</h5>
                        <div id="dbStatus" class="alert alert-info">Checking...</div>

                        <div class="mt-4">
                            <button class="btn btn-primary w-100 mb-2" onclick="checkDatabase()">
                                <i class="fas fa-sync"></i> Check Database
                            </button>
                            <a href="login.html" class="btn btn-info w-100">
                                <i class="fas fa-sign-in-alt"></i> Go to Login
                            </a>
                        </div>

                        <div class="mt-4 alert alert-warning">
                            <h6>Note</h6>
                            <p class="mb-1">This system uses Firebase Auth + Firestore.</p>
                            <p class="mb-1">To create the first admin, register via <a href="register.html">register.html</a> then manually set <code>role: "admin"</code> in Firestore Console.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, COLLECTIONS } from './assets/js/firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js';
        import { collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js';

        window.checkDatabase = checkDatabase;

        onAuthStateChanged(auth, (user) => {
            const el = document.getElementById('authStatus');
            if (user) {
                el.className = 'alert alert-success';
                el.innerHTML = `<strong>Logged in as:</strong> ${user.email}`;
            } else {
                el.className = 'alert alert-warning';
                el.innerHTML = '<strong>Not logged in.</strong> <a href="login.html">Login here</a>';
            }
        });

        async function checkDatabase() {
            const el = document.getElementById('dbStatus');
            el.className = 'alert alert-info';
            el.textContent = 'Checking...';
            try {
                const [usersSnap, residentsSnap, certsSnap] = await Promise.all([
                    getDocs(collection(db, COLLECTIONS.users)),
                    getDocs(collection(db, COLLECTIONS.residents)),
                    getDocs(collection(db, COLLECTIONS.certificates))
                ]);
                el.className = 'alert alert-success';
                el.innerHTML = `
                    <strong>Firestore connected ✅</strong><br>
                    Users: ${usersSnap.size}<br>
                    Residents: ${residentsSnap.size}<br>
                    Certificates: ${certsSnap.size}
                `;
            } catch (err) {
                el.className = 'alert alert-danger';
                el.innerHTML = `<strong>Error:</strong> ${err.message}`;
            }
        }

        // Auto-check on load
        document.addEventListener('DOMContentLoaded', checkDatabase);
    </script>
    <script src="assets/js/theme-toggle.js"></script>
</body>
</html>
