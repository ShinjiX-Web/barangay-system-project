<!DOCTYPE html>
<html data-bs-theme="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Register</title>
    <link rel="icon" type="image/png" href="assets/img/Seal_of_Angeles_City.png">
    <link rel="stylesheet" href="assets/fonts/fontawesome-all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="assets/css/skeleton.css">
</head>
<body>
    <button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()" title="Switch to Dark Mode">
        <i class="fas fa-moon fa-sm"></i>
    </button>
    <div class="register-wrapper">
        <div class="branding">
            <picture><source srcset="assets/img/Seal_of_Angeles_City.webp" type="image/webp"><img src="assets/img/Seal_of_Angeles_City.png" alt="Barangay 14 Seal" width="64" height="64"></picture>
            <span class="branding-name">Barangay<em>Serve</em></span>
        </div>

        <div class="register-card">
            <div class="register-header">
                <h1>Create an account</h1>
                <p>Fill in the details below to register</p>
            </div>

            <form class="user" novalidate>
                <!-- Name row -->
                <div class="form-row">
                    <div>
                        <label class="form-label" for="exampleFirstName">First Name</label>
                        <input class="shadcn-input" type="text" id="exampleFirstName"
                            placeholder="Juan" name="first_name" autocomplete="given-name">
                    </div>
                    <div>
                        <label class="form-label" for="exampleLastName">Last Name</label>
                        <input class="shadcn-input" type="text" id="exampleLastName"
                            placeholder="Dela Cruz" name="last_name" autocomplete="family-name">
                    </div>
                </div>

                <!-- Username -->
                <div class="form-group">
                    <label class="form-label" for="exampleUsername">
                        Username <span style="font-weight:400;color:var(--text-muted);">(optional)</span>
                    </label>
                    <input class="shadcn-input" type="text" id="exampleUsername"
                        placeholder="Defaults to email if left blank" name="username" autocomplete="username">
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label class="form-label" for="exampleInputEmail">Email</label>
                    <input class="shadcn-input" type="email" id="exampleInputEmail"
                        placeholder="m@example.com" name="email" autocomplete="email">
                </div>

                <!-- Role -->
                <div class="form-group">
                    <label class="form-label" for="exampleRole">Register as</label>
                    <div class="select-wrap">
                        <select class="shadcn-select" id="exampleRole" name="role"
                                onchange="toggleResidentFields(this.value)">
                            <option value="">Select a role…</option>
                            <option value="staff">Staff / Barangay Employee</option>
                            <option value="resident">Resident</option>
                        </select>
                    </div>
                </div>

                <!-- Resident-only fields -->
                <div id="residentFields">
                    <div class="resident-section">
                        <div class="resident-section-title">Resident Information</div>

                        <div class="form-row">
                            <div>
                                <label class="form-label" for="exampleGender">Gender</label>
                                <div class="select-wrap">
                                    <select class="shadcn-select" id="exampleGender" name="gender">
                                        <option value="">Select…</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label class="form-label" for="exampleAge">Age</label>
                                <input class="shadcn-input" type="number" id="exampleAge"
                                    placeholder="e.g. 25" name="age" min="1" max="120">
                            </div>
                        </div>

                        <div class="form-group" style="position:relative;">
                            <label class="form-label" for="exampleAddress">Complete Address</label>
                            <input class="shadcn-input" type="text" id="exampleAddress"
                                placeholder="Start typing your address…" name="address" autocomplete="off">
                            <ul id="addressSuggestions"></ul>
                        </div>

                        <div class="form-group" style="margin-bottom:0;">
                            <label class="form-label" for="exampleContact">Contact Number</label>
                            <input class="shadcn-input" type="tel" id="exampleContact"
                                placeholder="09XXXXXXXXX" name="contact">
                        </div>
                    </div>
                </div>

                <!-- Password row -->
                <div class="form-row">
                    <div>
                        <label class="form-label" for="examplePasswordInput">Password</label>
                        <div class="pw-wrap">
                            <input class="shadcn-input" type="password" id="examplePasswordInput"
                                name="password" autocomplete="new-password">
                            <button type="button" class="toggle-pw"
                                    onclick="togglePassword('examplePasswordInput', this)" tabindex="-1">
                                <i class="fas fa-eye fa-sm"></i>
                            </button>
                        </div>
                    </div>
                    <div>
                        <label class="form-label" for="exampleRepeatPasswordInput">Confirm Password</label>
                        <div class="pw-wrap">
                            <input class="shadcn-input" type="password" id="exampleRepeatPasswordInput"
                                name="password_repeat" autocomplete="new-password">
                            <button type="button" class="toggle-pw"
                                    onclick="togglePassword('exampleRepeatPasswordInput', this)" tabindex="-1">
                                <i class="fas fa-eye fa-sm"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <button class="btn-register" type="submit" id="registerBtn">Create Account</button>
            </form>

            <div class="login-text">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>

        <a class="back-home" href="/">
            <i class="fas fa-arrow-left"></i> Back to Homepage
        </a>
    </div>

    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/password-toggle.js"></script>
    <script src="assets/js/register-helpers.js"></script>
    <script type="module" src="assets/js/register.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    
</body>
</html>
