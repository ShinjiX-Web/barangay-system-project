<!DOCTYPE html>
<html data-bs-theme="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Login</title>
    <link rel="icon" type="image/png" href="assets/img/Seal_of_Angeles_City.png">
    <link rel="stylesheet" href="assets/fonts/fontawesome-all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="assets/css/login.css">
    <script src="https://www.google.com/recaptcha/enterprise.js" async defer></script>
</head>

<body>
<!-- Striped background pattern -->
<svg class="striped-pattern" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="stripe-bg" width="10" height="10" patternUnits="userSpaceOnUse">
      <line x1="0" y1="10" x2="10" y2="0" stroke="currentColor"/>
      <line x1="-10" y1="10" x2="0" y2="0" stroke="currentColor"/>
      <line x1="10" y1="10" x2="20" y2="0" stroke="currentColor"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#stripe-bg)"/>
</svg>
    <button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()" title="Switch to Dark Mode">
        <i class="fas fa-moon fa-sm"></i>
    </button>

    <div class="login-layout">
    <div class="cloud-side">
        <canvas id="icon-cloud-canvas" width="500" height="500" aria-label="Icon Cloud" role="img"></canvas>
    </div>
    <div class="login-wrapper">
        <div class="branding">
            <picture><source srcset="assets/img/Seal_of_Angeles_City.webp" type="image/webp"><img src="assets/img/Seal_of_Angeles_City.png" alt="Barangay 14 Seal" width="64" height="64"></picture>
            <span class="branding-name">Barangay<em>Serve</em></span>
        </div>

        <div class="login-card">
            <div class="border-beam-wrap"><div class="border-beam"></div></div>
            <div class="login-header">
                <h1>Login to your account</h1>
                <p>Enter your email below to login to your account</p>
            </div>

            <form class="user" novalidate>
                <div class="form-group">
                    <label class="form-label" for="exampleInputEmail">Email</label>
                    <input class="shadcn-input" type="email" id="exampleInputEmail"
                        placeholder="m@example.com" name="email" autocomplete="email">
                </div>

                <div class="form-group">
                    <div class="label-row">
                        <label class="form-label" for="exampleInputPassword">Password</label>
                        <a class="forgot-link" href="forgot-password.html">Forgot your password?</a>
                    </div>
                    <div class="pw-wrap">
                        <input class="shadcn-input" type="password" id="exampleInputPassword"
                            name="password" autocomplete="current-password">
                        <button type="button" class="toggle-pw"
                                onclick="togglePassword('exampleInputPassword', this)" tabindex="-1">
                            <i class="fas fa-eye fa-sm"></i>
                        </button>
                    </div>
                </div>

                <div class="g-recaptcha"
                     data-sitekey="6Le2bLIsAAAAAJ2XNNBRT6GwOvE1yrn40z9H2kc9"
                     data-action="LOGIN"></div>
                <button class="btn-login" type="submit" id="loginBtn">Login</button>
            </form>

            <div class="divider"><span>or</span></div>

            <button class="btn-google" id="googleLoginBtn" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="18" height="18">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    <path fill="none" d="M0 0h48v48H0z"/>
                </svg>
                Continue with Google
            </button>

            <div class="signup-text">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>

        <a class="back-home" href="/">
            <i class="fas fa-arrow-left"></i> Back to Homepage
        </a>
    </div>
    </div> <!-- /.login-layout -->

    <!-- Firebase SDKs -->
    <script type="module" src="assets/js/firebase-config.js"></script>
    <script type="module" src="assets/js/firebase-db.js"></script>
    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="assets/js/password-toggle.js"></script>
    <script type="module" src="assets/js/login.js"></script>

    <!-- Load last so toggleTheme() is available before DOMContentLoaded -->
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/icon-cloud.js"></script>

    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        // TODO: Add SDKs for Firebase products that you want to use
        // https://firebase.google.com/docs/web/setup#available-libraries

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBlwBMPfxJLyGFBbLwzG4xfJekjVbM6eCM",
            authDomain: "barangay-system-701b9.firebaseapp.com",
            projectId: "barangay-system-701b9",
            storageBucket: "barangay-system-701b9.firebasestorage.app",
            messagingSenderId: "595188953117",
            appId: "1:595188953117:web:f7e648f03f615e29a6d6f4"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
    </script>

</body>

</html>
