<!DOCTYPE html>
<html data-bs-theme="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Register - Brand</title>
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i&amp;display=swap">
    <link rel="stylesheet" href="assets/fonts/fontawesome-all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-theme.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>

<body class="bg-gradient-primary">
    <!-- Theme Toggle Button (Fixed Position) -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 1050;">
        <button class="btn btn-link text-white" id="themeToggleBtn" onclick="toggleTheme()" title="Switch to Dark Mode">
            <i class="fas fa-moon fa-fw fa-2x"></i>
        </button>
    </div>
    
    <div class="container d-flex align-items-center min-vh-100">
        <div class="row justify-content-center w-100">
            <div class="col-md-9 col-lg-12 col-xl-10">
                <div class="card shadow-lg my-5 o-hidden border-0">
            <div class="card-body p-0">
                <div class="row">
                    <div class="col-lg-5 d-none d-lg-flex">
                        <div class="flex-grow-1 bg-register-image"></div>
                    </div>
                    <div class="col-lg-7">
                        <div class="p-5">
                            <div class="text-center">
                                <h4 class="text-dark mb-4">Create an Account!</h4>
                            </div>
                            <form class="user">
                                <div class="mb-3 row">
                                    <div class="col-sm-6 mb-3 mb-sm-0"><input class="form-control form-control-user" type="text" id="exampleFirstName" placeholder="First Name" name="first_name"></div>
                                    <div class="col-sm-6"><input class="form-control form-control-user" type="text" id="exampleLastName" placeholder="Last Name" name="last_name"></div>
                                </div>
                                <div class="mb-3"><input class="form-control form-control-user" type="text" id="exampleUsername" placeholder="Username (optional — defaults to email)" name="username"></div>
                                <div class="mb-3"><input class="form-control form-control-user" type="email" id="exampleInputEmail" aria-describedby="emailHelp" placeholder="Email Address" name="email"></div>
                                <div class="mb-3">
                                    <select class="form-control form-control-user" id="exampleRole" name="role" required>
                                        <option value="">Register as...</option>
                                        <option value="staff">Staff / Barangay Employee</option>
                                        <option value="resident">Resident</option>
                                    </select>
                                </div>
                                <div class="mb-3 row">
                                    <div class="col-sm-6 mb-3 mb-sm-0 position-relative">
                                        <input class="form-control form-control-user" type="password" id="examplePasswordInput" placeholder="Password" name="password">
                                        <button type="button" class="btn btn-link position-absolute end-0 top-50 translate-middle-y" onclick="togglePassword('examplePasswordInput', this)" style="z-index: 10; padding-right: 20px;">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                    <div class="col-sm-6 position-relative">
                                        <input class="form-control form-control-user" type="password" id="exampleRepeatPasswordInput" placeholder="Repeat Password" name="password_repeat">
                                        <button type="button" class="btn btn-link position-absolute end-0 top-50 translate-middle-y" onclick="togglePassword('exampleRepeatPasswordInput', this)" style="z-index: 10; padding-right: 20px;">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                </div><button class="btn btn-primary d-block w-100 btn-user" type="submit">Register Account</button>

                            </form>
                            <div class="text-center"><a class="small" href="forgot-password.html">Forgot Password?</a></div>
                            <div class="text-center"><a class="small" href="login.html">Already have an account? Login!</a></div>
                        </div>
                    </div>
                </div>
            </div>
                </div>
            </div>
        </div>
    </div>
    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="assets/js/bs-init.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Password Toggle Function -->
    <script>
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
    <script type="module">
        import { registerUser } from './assets/js/auth-firebase.js';
        import { db, COLLECTIONS } from './assets/js/firebase-config.js';
        import { doc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js';

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form.user');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const firstName = document.getElementById('exampleFirstName').value.trim();
                    const lastName  = document.getElementById('exampleLastName').value.trim();
                    const username  = document.getElementById('exampleUsername').value.trim();
                    const email     = document.getElementById('exampleInputEmail').value.trim();
                    const role      = document.getElementById('exampleRole').value;
                    const password  = document.getElementById('examplePasswordInput').value;
                    const repeat    = document.getElementById('exampleRepeatPasswordInput').value;

                    if (!firstName || !lastName || !email || !role || !password) {
                        Swal.fire('Error', 'Please fill all required fields including role.', 'warning');
                        return;
                    }
                    if (password.length < 6) {
                        Swal.fire('Error', 'Password must be at least 6 characters.', 'warning');
                        return;
                    }
                    if (password !== repeat) {
                        Swal.fire('Error', 'Passwords do not match.', 'warning');
                        return;
                    }

                    try {
                        const uid = await registerUser(firstName, lastName, email, password, role);

                        // Save username — non-critical, ignore if it fails
                        if (uid) {
                            try {
                                await updateDoc(doc(db, COLLECTIONS.users, uid), {
                                    username: username || email,
                                    updatedAt: serverTimestamp()
                                });
                            } catch (updateErr) {
                                console.warn('Username update skipped:', updateErr.message);
                            }
                        }

                        Swal.fire({
                            icon: 'success',
                            title: '🎉 Registration Successful!',
                            html: `Welcome, <strong>${firstName} ${lastName}</strong>!<br><br>
                                Your account is <strong>pending approval</strong> from the Barangay Captain.<br>
                                You will receive a notification once your account is activated.`,
                            confirmButtonText: 'Back to Homepage',
                            confirmButtonColor: '#4e73df',
                            allowOutsideClick: false
                        }).then(() => { window.location.href = 'index.html'; });

                    } catch (error) {
                        const msg = error.code === 'auth/email-already-in-use'
                            ? 'This email is already registered.'
                            : error.message;
                        Swal.fire('Registration Failed', msg, 'error');
                    }
                });
            }
        });
    </script>
</body>

</html>
