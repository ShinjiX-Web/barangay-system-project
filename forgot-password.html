<!DOCTYPE html>
<html data-bs-theme="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Forgot Password - Barangay 14</title>
    <link rel="icon" type="image/png" href="assets/img/Seal_of_Angeles_City.png">
    <link rel="stylesheet" href="assets/fonts/fontawesome-all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="assets/css/forgot-password.css">
</head>

<body>
    <button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()" title="Switch to Dark Mode">
        <i class="fas fa-moon fa-sm"></i>
    </button>

    <div class="page-wrapper">
        <div class="branding">
            <picture><source srcset="assets/img/Seal_of_Angeles_City.webp" type="image/webp"><img src="assets/img/Seal_of_Angeles_City.png" alt="Barangay 14 Seal" width="64" height="64"></picture>
            <span class="branding-name">Barangay 14</span>
        </div>

        <div class="card">
            <!-- Icon -->
            <div class="icon-wrap">
                <i class="fas fa-lock"></i>
            </div>

            <div class="card-header-text">
                <h1>Forgot your password?</h1>
                <p>Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <!-- Success notice (shown after send) -->
            <div class="success-box" id="successBox">
                <i class="fas fa-circle-check"></i>
                <div class="success-box-text">
                    <strong>Reset link sent!</strong>
                    <span id="successMsg">Check your inbox and follow the instructions to reset your password.</span>
                </div>
            </div>

            <form id="resetForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="resetEmail">Email address</label>
                    <input class="shadcn-input" type="email" id="resetEmail"
                           placeholder="m@example.com" name="email" autocomplete="email">
                </div>

                <button class="btn-submit" type="submit" id="submitBtn">
                    Send reset link
                </button>
            </form>

            <!-- Resend option (shown after first send) -->
            <div class="resend-row" id="resendRow">
                Didn't receive it?
                <button class="resend-btn" id="resendBtn" disabled onclick="resendEmail()">
                    Resend in <span id="countdown">60</span>s
                </button>
            </div>

            <a class="back-link" href="login.html">
                <i class="fas fa-arrow-left"></i> Back to login
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script type="module" src="assets/js/forgot-password.js"></script>

    <script src="assets/js/theme-toggle.js"></script>
</body>

</html>
