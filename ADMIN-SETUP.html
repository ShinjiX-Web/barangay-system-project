<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Setup - Barangay 14</title>
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gradient-primary">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 mt-5">
                <div class="card shadow">
                    <div class="card-header">
                        <h4 class="text-primary mb-0">Admin Setup & Database Check</h4>
                    </div>
                    <div class="card-body">
                        <h5>Database Status</h5>
                        <div id="dbStatus" class="alert alert-info">Checking...</div>
                        
                        <h5 class="mt-4">Admin Account</h5>
                        <div id="adminStatus" class="alert alert-info">Checking...</div>
                        
                        <div class="mt-4">
                            <button class="btn btn-primary w-100 mb-2" onclick="checkDatabase()">
                                <i class="fas fa-sync"></i> Check Database
                            </button>
                            <button class="btn btn-success w-100 mb-2" onclick="createAdmin()">
                                <i class="fas fa-user-plus"></i> Create Admin Account
                            </button>
                            <button class="btn btn-warning w-100 mb-2" onclick="clearDatabase()">
                                <i class="fas fa-trash"></i> Clear Database (Reset)
                            </button>
                            <a href="login.html" class="btn btn-info w-100">
                                <i class="fas fa-sign-in-alt"></i> Go to Login
                            </a>
                        </div>
                        
                        <div class="mt-4">
                            <h6>Default Credentials:</h6>
                            <p class="mb-1"><strong>Email:</strong> admin@brgy14.gov.ph</p>
                            <p class="mb-0"><strong>Password:</strong> admin123</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/database.js"></script>
    <script>
        function checkDatabase() {
            const users = getUsers();
            const residents = getResidents();
            const certificates = getCertificates();
            
            const dbStatus = document.getElementById('dbStatus');
            const adminStatus = document.getElementById('adminStatus');
            
            // Check database
            const isInit = localStorage.getItem('dbInitialized');
            dbStatus.className = 'alert ' + (isInit ? 'alert-success' : 'alert-warning');
            dbStatus.innerHTML = `
                <strong>Database Status:</strong> ${isInit ? 'Initialized ✅' : 'Not initialized ⚠️'}<br>
                <strong>Users:</strong> ${Object.keys(users).length}<br>
                <strong>Residents:</strong> ${Object.keys(residents).length}<br>
                <strong>Certificates:</strong> ${Object.keys(certificates).length}
            `;
            
            // Check admin
            const adminEmail = 'admin@brgy14.gov.ph';
            const admin = users[adminEmail];
            
            adminStatus.className = 'alert ' + (admin ? 'alert-success' : 'alert-danger');
            if (admin) {
                adminStatus.innerHTML = `
                    <strong>Admin Status:</strong> Exists ✅<br>
                    <strong>Name:</strong> ${admin.firstName} ${admin.lastName}<br>
                    <strong>Email:</strong> ${admin.email}<br>
                    <strong>Role:</strong> ${admin.role}<br>
                    <strong>Position:</strong> ${admin.position}
                `;
            } else {
                adminStatus.innerHTML = `
                    <strong>Admin Status:</strong> Not found ❌<br>
                    Click "Create Admin Account" button to create default admin.
                `;
            }
        }
        
        function createAdmin() {
            createDefaultAdmin();
            localStorage.setItem('dbInitialized', 'true');
            
            Swal.fire({
                icon: 'success',
                title: 'Admin Created!',
                html: `
                    Default admin account created successfully!<br><br>
                    <strong>Email:</strong> admin@brgy14.gov.ph<br>
                    <strong>Password:</strong> admin123
                `,
                confirmButtonColor: '#4e73df'
            }).then(() => {
                checkDatabase();
            });
        }
        
        function clearDatabase() {
            Swal.fire({
                icon: 'warning',
                title: 'Clear Database?',
                text: 'This will delete ALL data including users, residents, and certificates!',
                showCancelButton: true,
                confirmButtonColor: '#e74a3b',
                cancelButtonColor: '#858796',
                confirmButtonText: 'Yes, clear it!'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.clear();
                    Swal.fire({
                        icon: 'success',
                        title: 'Database Cleared!',
                        text: 'All data has been removed.',
                        confirmButtonColor: '#4e73df'
                    }).then(() => {
                        checkDatabase();
                    });
                }
            });
        }
        
        // Check on page load
        window.addEventListener('DOMContentLoaded', function() {
            initializeDatabase();
            checkDatabase();
        });
    </script>
</body>
</html>
